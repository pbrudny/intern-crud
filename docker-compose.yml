version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///intern_crud.db}
      - FLASK_ENV=production
      - UPLOAD_FOLDER=/app/uploads/resumes
      - MAX_CONTENT_LENGTH=2097152
    volumes:
      - uploads:/app/uploads
      - db:/app/backend/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads:
  db:

